<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mathe – Kombi-Aufgaben</title>
  <style>
    :root{font-family:-apple-system,system-ui,Arial,sans-serif}
    body{margin:0;background:radial-gradient(1100px 700px at 15% 0%,#fff4e8 0%,#f6f7fb 45%),radial-gradient(900px 600px at 90% 5%,#e9f5ff 0%,#f6f7fb 55%),#f6f7fb;color:#111}
    header{position:sticky;top:0;background:rgba(246,247,251,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e6e6ef;padding:14px;z-index:10}
    h1{margin:0;font-size:18px;font-weight:900}
    .sub{margin-top:6px;font-size:13px;opacity:.75;line-height:1.35}
    main{max-width:980px;margin:0 auto;padding:14px 12px 110px}
    .card{background:#fff;border:1px solid #e6e6ef;border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 1px 0 rgba(0,0,0,.03)}
    .q{padding:12px;border-radius:16px;background:radial-gradient(600px 120px at 20% 0%,#fff8ea 0%,rgba(255,248,234,0) 60%),radial-gradient(600px 120px at 90% 10%,#eef7ff 0%,rgba(238,247,255,0) 60%),#fafaff;border:1px solid #ededff;margin:10px 0}
    input{width:100%;padding:10px 12px;border-radius:14px;border:1px solid #d9d9e7;font-size:16px;background:#fff}
    .hint{margin-top:8px;font-size:13px;opacity:.75;line-height:1.35}
    .result{margin-top:10px;padding:10px 12px;border-radius:14px;border:1px solid #e6e6ef;background:#fff}
    .btnbar{position:fixed;left:0;right:0;bottom:0;background:rgba(246,247,251,.92);backdrop-filter:blur(10px);border-top:1px solid #e6e6ef;padding:10px 12px}
    button{width:100%;padding:12px 14px;border-radius:16px;border:0;background:#111;color:#fff;font-size:16px;font-weight:900}
    .smallbtns3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
    .ghost{background:#fff;color:#111;border:1px solid #d9d9e7}
    .back a{display:inline-block;text-decoration:none;color:#111;border:1px solid #d9d9e7;background:#fff;padding:9px 12px;border-radius:999px;font-weight:850}
  </style>
</head>
<body>
<header>
  <h1>🧩 Mathe: Kombi-Aufgaben</h1>
  <div class="sub">ml, g, min – gemischt wie im Test</div>
</header>

<main>
  <div class="card back">
    <a href="./index.html">⬅️ Zurück zur Startseite</a>
    <div class="hint">Tipp: Erst in eine Einheit umrechnen (ml / g / min), dann rechnen.</div>
  </div>

  <div class="card">
    <div id="quizMount"></div>
  </div>
</main>

<div class="btnbar">
  <button id="checkBtn">✅ Prüfen</button>
  <div class="smallbtns3">
    <button class="ghost" id="newBtn" type="button">🔄 Neue Runde</button>
    <button class="ghost" id="resetBtn" type="button">↩️ Reset</button>
    <button class="ghost" id="showBtn" type="button">👀 Lösungen</button>
  </div>
</div>

<script type="module">
  import { randInt, choice, renderQuiz } from "./quizlib.js";

  function build(){
    const qs=[];
    // 1) ml left
    {
      const start = choice([750,800,900,1000]);
      const drink = choice([150,200,250,300]);
      qs.push({
        id:"k1",
        type:"num",
        promptHtml:`<b>1)</b> Eine Flasche enthält ${start} ml. Tim trinkt ${drink} ml. Übrig: ____ ml`,
        answer:String(start - drink)
      });
    }
    // 2) weights sum (kg + g)
    {
      const kg = choice([2,3,4]);
      const g = choice([150,250,350,450,600,750]);
      const add = choice([200,300,450,500,650]);
      qs.push({
        id:"k2",
        type:"num",
        promptHtml:`<b>2)</b> Ein Rucksack wiegt ${kg} kg ${g} g. Eine Trinkflasche wiegt ${add} g. Zusammen: ____ g`,
        answer:String(kg*1000 + g + add),
        explain:"Rechne alles in Gramm."
      });
    }
    // 3) time total
    {
      const train = choice([35,40,45,50,55]);
      const pause = choice([5,10,15,20]);
      qs.push({
        id:"k3",
        type:"num",
        promptHtml:`<b>3)</b> Training dauert ${train} min. Pause dauert ${pause} min. Insgesamt: ____ min`,
        answer:String(train + pause)
      });
    }
    // 4) film remaining
    {
      const total = choice([70,80,90,95,100]);
      const watched = randInt(25, total-10);
      qs.push({
        id:"k4",
        type:"num",
        promptHtml:`<b>4)</b> Ein Film dauert ${total} min. Nach ${watched} min Pause: Restzeit: ____ min`,
        answer:String(total - watched)
      });
    }
    return qs;
  }

  let api=null;
  function newRound(){ api = renderQuiz({ mount:document.getElementById("quizMount"), questions: build() }); }
  newRound();

  document.getElementById("checkBtn").addEventListener("click", ()=>api.check());
  document.getElementById("resetBtn").addEventListener("click", ()=>api.reset());
  document.getElementById("showBtn").addEventListener("click", ()=>api.showSolutions());
  document.getElementById("newBtn").addEventListener("click", newRound);
</script>
</body>
</html>
