<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mathe – Hohlmasse (ml / l)</title>
  <style>
    :root{font-family:-apple-system,system-ui,Arial,sans-serif}
    body{margin:0;background:radial-gradient(1100px 700px at 15% 0%,#fff4e8 0%,#f6f7fb 45%),radial-gradient(900px 600px at 90% 5%,#e9f5ff 0%,#f6f7fb 55%),#f6f7fb;color:#111}
    header{position:sticky;top:0;background:rgba(246,247,251,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e6e6ef;padding:14px;z-index:10}
    h1{margin:0;font-size:18px;font-weight:900}
    .sub{margin-top:6px;font-size:13px;opacity:.75;line-height:1.35}
    main{max-width:980px;margin:0 auto;padding:14px 12px 110px}
    .card{background:#fff;border:1px solid #e6e6ef;border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 1px 0 rgba(0,0,0,.03)}
    .q{padding:12px;border-radius:16px;background:radial-gradient(600px 120px at 20% 0%,#fff8ea 0%,rgba(255,248,234,0) 60%),radial-gradient(600px 120px at 90% 10%,#eef7ff 0%,rgba(238,247,255,0) 60%),#fafaff;border:1px solid #ededff;margin:10px 0}
    input,select{width:100%;padding:10px 12px;border-radius:14px;border:1px solid #d9d9e7;font-size:16px;background:#fff}
    label{display:block;margin:8px 0}
    .hint{margin-top:8px;font-size:13px;opacity:.75;line-height:1.35}
    .result{margin-top:10px;padding:10px 12px;border-radius:14px;border:1px solid #e6e6ef;background:#fff}
    .btnbar{position:fixed;left:0;right:0;bottom:0;background:rgba(246,247,251,.92);backdrop-filter:blur(10px);border-top:1px solid #e6e6ef;padding:10px 12px}
    button{width:100%;padding:12px 14px;border-radius:16px;border:0;background:#111;color:#fff;font-size:16px;font-weight:900}
    .smallbtns3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
    .ghost{background:#fff;color:#111;border:1px solid #d9d9e7}
    .back a{display:inline-block;text-decoration:none;color:#111;border:1px solid #d9d9e7;background:#fff;padding:9px 12px;border-radius:999px;font-weight:850}
  </style>
</head>
<body>
<header>
  <h1>🥤 Mathe: Hohlmasse (ml / l)</h1>
  <div class="sub">Ergänzen · Umrechnen · Schätzen · Stimmt das?</div>
</header>

<main>
  <div class="card back">
    <a href="./index.html">⬅️ Zurück zur Startseite</a>
    <div class="hint">Merke: <b>1 l = 1000 ml</b>, <b>0.5 l = 500 ml</b></div>
  </div>

  <div class="card">
    <div id="quizMount"></div>
  </div>
</main>

<div class="btnbar">
  <button id="checkBtn">✅ Prüfen</button>
  <div class="smallbtns3">
    <button class="ghost" id="newBtn" type="button">🔄 Neue Runde</button>
    <button class="ghost" id="resetBtn" type="button">↩️ Reset</button>
    <button class="ghost" id="showBtn" type="button">👀 Lösungen</button>
  </div>
</div>

<script type="module">
  import { randInt, choice, renderQuiz, shuffle } from "./quizlib.js";

  function build(){
    const qs=[];

    // Ergänzen bis Zielmenge
    const targets = shuffle([100,250,500,1000]).slice(0,3);
    targets.forEach((T, idx)=>{
      const a = randInt(Math.floor(T*0.35), Math.floor(T*0.9));
      qs.push({
        id:"e"+idx,
        type:"num",
        promptHtml:`<b>A${idx+1})</b> ${a} ml + ____ ml = ${T===1000?"1 l (1000 ml)":`${T} ml`}`,
        answer:String(T - a),
      });
    });

    // Umrechnen
    {
      const ml = choice([750,650,1200,1350,980]);
      if(ml<1000){
        const l = 0;
        qs.push({ id:"u1", type:"pair", promptHtml:`<b>B1)</b> ${ml} ml = ____ l ____ ml`, answer:`${l}|${ml}` });
      } else {
        const l = Math.floor(ml/1000);
        const r = ml%1000;
        qs.push({ id:"u1", type:"pair", promptHtml:`<b>B1)</b> ${ml} ml = ____ l ____ ml`, answer:`${l}|${r}` });
      }
    }
    {
      const l = choice([1,2]);
      const r = choice([100,200,250,350,450,600,750]);
      qs.push({
        id:"u2",
        type:"num",
        promptHtml:`<b>B2)</b> ${l} l ${r} ml = ____ ml`,
        answer:String(l*1000 + r),
      });
    }
    {
      const a = choice([250,200,150,350]);
      const n = choice([2,3,4]);
      qs.push({
        id:"u3",
        type:"num",
        promptHtml:`<b>B3)</b> ${n} × ${a} ml = ____ ml`,
        answer:String(n*a),
      });
    }
    {
      const base = choice([1000,1500,2000]);
      const sub = choice([150,200,250,350,450,600]);
      qs.push({
        id:"u4",
        type:"num",
        promptHtml:`<b>B4)</b> ${base} ml − ${sub} ml = ____ ml`,
        answer:String(base - sub),
      });
    }

    // Schätzen — Multiple choice
    const estimate = shuffle([
      {t:"Ein Trinkglas fasst eher …", opts:[{v:"100",label:"100 ml"},{v:"250",label:"250 ml"},{v:"1000",label:"1 l"}], a:"250"},
      {t:"Ein Putzeimer fasst eher …", opts:[{v:"2",label:"2 l"},{v:"5",label:"5 l"},{v:"10",label:"10 l"}], a:"10"},
      {t:"Eine Shampoo-Flasche hat eher …", opts:[{v:"50",label:"50 ml"},{v:"250",label:"250 ml"},{v:"2000",label:"2 l"}], a:"250"},
    ])[0];

    qs.push({
      id:"s1",
      type:"select",
      promptHtml:`<b>C1)</b> ${estimate.t}`,
      options:estimate.opts,
      answer:estimate.a
    });

    // Stimmt das?
    const tf = shuffle([
      {t:"500 ml sind mehr als ein halber Liter.", a:"falsch"},
      {t:"Ein Liter ist gleich viel wie 1000 ml.", a:"richtig"},
      {t:"In eine Badewanne passen weniger als 10 Liter.", a:"falsch"},
    ]).slice(0,2);

    tf.forEach((x,i)=>qs.push({
      id:"t"+i,
      type:"select",
      promptHtml:`<b>D${i+1})</b> ${x.t}`,
      options:[{v:"richtig",label:"richtig"},{v:"falsch",label:"falsch"}],
      answer:x.a
    }));

    return qs;
  }

  let api=null;
  function newRound(){ api = renderQuiz({ mount:document.getElementById("quizMount"), questions: build() }); }
  newRound();

  document.getElementById("checkBtn").addEventListener("click", ()=>api.check());
  document.getElementById("resetBtn").addEventListener("click", ()=>api.reset());
  document.getElementById("showBtn").addEventListener("click", ()=>api.showSolutions());
  document.getElementById("newBtn").addEventListener("click", newRound);
</script>
</body>
</html>
