<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Wortarten – Meisterlevel</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#eef3ff;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  padding:80px 40px;
  border-radius:30px;
  box-shadow:0 12px 30px rgba(0,0,0,0.15);
  margin:30px auto;
  max-width:700px;
  font-size:54px;
  font-weight:bold;
}

button{
  margin:10px;
  padding:14px 20px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#4CAF50;
  color:white;
}

button.help{background:#ff9800;}
button.next{background:#2196F3;}
button.back{background:#9c27b0;}

.result{
  font-size:18px;
  margin-top:20px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
}

.hidden{display:none;}
</style>
</head>
<body>

<h1>📚 Wortarten – Meisterlevel</h1>
<p>20 Karten · Schwer</p>

<div class="card" id="card"></div>

<div id="buttons">
  <button onclick="guess('Nomen')">Nomen</button>
  <button onclick="guess('Verb')">Verb</button>
  <button onclick="guess('Adjektiv')">Adjektiv</button>
  <button onclick="guess('Pronomen')">Pronomen</button>
  <button onclick="guess('Adverb')">Adverb</button>
</div>

<br>
<button class="help" onclick="showHelp()">💡 Hilfe</button>
<button class="next hidden" onclick="nextCard()">Weiter ➡</button>

<div style="margin-top:30px;">
  <button class="back" onclick="previousCard()">⬅ Zurück</button>
</div>

<div class="result" id="feedback"></div>
<div id="summary" class="hidden"></div>

<script>

// ---------------- LARGE WORD POOLS ----------------

const characters = ["Gumball","Darwin","Anais","Nicole","Richard","Tobias","Penny","Banana Joe"];

const nounPool = ["Konsequenz","Katastrophe","Strategie","Illusion","Explosion","Diskussion","Entscheidung","Reaktion","Verantwortung","Geheimnis","Mission","Transformation","Provokation","Manipulation","Verwirrung","Komplikation","Theorie","Vision","Kollision","Mutation"];

const verbPool = ["explodiert","manipuliert","diskutiert","provoziert","analysiert","ignoriert","übertreibt","unterschätzt","reagiert","konzentriert sich","verzweifelt","beschleunigt","unterbricht","überrascht","beobachtet","argumentiert","verursacht","verschwindet","verwirrt","entwickelt"];

const adjectivePool = ["chaotisch","dramatisch","ironisch","strategisch","überraschend","mysteriös","unglaublich","riskant","kompliziert","genial","absurd","lächerlich","intelligent","verwirrend","übertrieben","unlogisch","peinlich","mutig","verantwortungslos","brillant"];

const pronounPool = ["niemand","jemand","dieser","welcher","man","alle","keiner","etwas","nichts","solcher"];

const adverbPool = ["plötzlich","absichtlich","wahrscheinlich","unbedingt","extrem","heimlich","ständig","unerwartet","merkwürdigerweise","offensichtlich"];

// build 1000 unique entries
let wordDB = [];

function buildDatabase(){
  for(let i=0;i<200;i++){
    wordDB.push(makeEntry(nounPool,"Nomen"));
    wordDB.push(makeEntry(verbPool,"Verb"));
    wordDB.push(makeEntry(adjectivePool,"Adjektiv"));
    wordDB.push(makeEntry(pronounPool,"Pronomen"));
    wordDB.push(makeEntry(adverbPool,"Adverb"));
  }
}

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function makeEntry(pool,type){

  let word = random(pool);
  let char1 = random(characters);
  let char2 = random(characters);

  let sentence="";

  if(type==="Nomen"){
    sentence = char1+" verursacht eine unglaubliche <b>"+word+"</b>, während "+char2+" nur zuschaut.";
  }

  if(type==="Verb"){
    sentence = char1+" <b>"+word+"</b> völlig übertrieben im Klassenzimmer.";
  }

  if(type==="Adjektiv"){
    sentence = "Der Plan von "+char1+" ist absolut <b>"+word+"</b> und bringt alle durcheinander.";
  }

  if(type==="Pronomen"){
    sentence = "<b>"+word+"</b> versteht wirklich, warum "+char1+" so reagiert.";
  }

  if(type==="Adverb"){
    sentence = char1+" reagiert <b>"+word+"</b>, nachdem Darwin alles falsch erklärt hat.";
  }

  return {word:word,type:type,sentence:sentence};
}

buildDatabase();

// ---------------- TRUE SHUFFLE ----------------

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

// ---------------- SPACED REPETITION ----------------

let wrongStats = JSON.parse(localStorage.getItem("wortStatsPro")) || {};
let gameWords=[];
let current=0;
let score=0;
let answered=[];

function weightedSelection(){

  let weighted=[];

  wordDB.forEach(w=>{
    let weight = wrongStats[w.word] ? 10 : 1;
    for(let i=0;i<weight;i++){
      weighted.push(w);
    }
  });

  shuffle(weighted);

  let selected=[];
  let used=new Set();

  for(let w of weighted){
    if(!used.has(w.word)){
      selected.push(w);
      used.add(w.word);
    }
    if(selected.length===20) break;
  }

  return selected;
}

function startGame(){
  gameWords = weightedSelection();
  current=0;
  score=0;
  answered=[];
  showCard();
}

function showCard(){
  document.getElementById("feedback").innerHTML="";
  document.getElementById("card").innerHTML=gameWords[current].word;
}

function guess(type){

  if(answered[current]) return;

  let correct=gameWords[current].type;
  let word=gameWords[current].word;

  if(type===correct){
    score++;
    document.getElementById("feedback").innerHTML=
      "🎉 Richtig! <b>"+word+"</b> ist ein "+correct+".";
  } else {
    wrongStats[word]=true;
    document.getElementById("feedback").innerHTML=
      "❌ Falsch! <b>"+word+"</b> ist ein "+correct+".";
  }

  localStorage.setItem("wortStatsPro",JSON.stringify(wrongStats));
  answered[current]=true;
}

function showHelp(){
  document.getElementById("feedback").innerHTML=
    "💡 "+gameWords[current].sentence;
}

function nextCard(){
  if(current<19){
    current++;
    showCard();
  } else {
    endGame();
  }
}

function previousCard(){
  if(current>0){
    current--;
    showCard();
  }
}

function endGame(){

  document.getElementById("card").classList.add("hidden");
  document.getElementById("buttons").classList.add("hidden");

  let html="<h2>🏁 Ergebnis</h2>";
  html+="Du hast "+score+" von 20 richtig.<br>";

  if(score===20){
    html+="🌟 Perfekt!";
  } else if(score>=15){
    html+="🔥 Sehr stark!";
  } else {
    html+="💪 Weiter trainieren!";
  }

  document.getElementById("summary").innerHTML=html;
  document.getElementById("summary").classList.remove("hidden");
}

startGame();

</script>
</body>
</html>
