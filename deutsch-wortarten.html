<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Wortarten Meister – Elmore Edition</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#8ec5fc,#e0c3fc);
  text-align:center;
  padding:20px;
  margin:0;
}

h1{
  color:white;
  text-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

.card{
  background:white;
  padding:90px 40px;
  border-radius:30px;
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
  margin:40px auto;
  max-width:800px;
  font-size:60px;
  font-weight:bold;
}

button{
  margin:8px;
  padding:14px 22px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
}

.nomen{background:#4CAF50;}
.verb{background:#2196F3;}
.adj{background:#ff9800;}
.pron{background:#9c27b0;}
.adv{background:#e91e63;}
.help{background:#607d8b;}
.next{background:#3f51b5;}
.back{background:#673ab7;}

button:hover{opacity:0.9;}

.feedback{
  margin-top:20px;
  font-size:18px;
  max-width:800px;
  margin-left:auto;
  margin-right:auto;
  background:white;
  padding:15px;
  border-radius:15px;
}

.summary{
  margin-top:30px;
  font-size:20px;
  background:white;
  padding:20px;
  border-radius:20px;
  max-width:800px;
  margin-left:auto;
  margin-right:auto;
}

.hidden{display:none;}
</style>
</head>
<body>

<h1>📚 Wortarten Meister – Elmore Edition</h1>
<p style="color:white;">20 zufällige Karten · Schwer · Mit Humor</p>

<div id="card" class="card"></div>

<div id="choices">
  <button class="nomen" onclick="guess('Nomen')">Nomen</button>
  <button class="verb" onclick="guess('Verb')">Verb</button>
  <button class="adj" onclick="guess('Adjektiv')">Adjektiv</button>
  <button class="pron" onclick="guess('Pronomen')">Pronomen</button>
  <button class="adv" onclick="guess('Adverb')">Adverb</button>
</div>

<br>
<button class="help" onclick="showHelp()">💡 Hilfe (Mini-Episode)</button>
<button class="next hidden" id="nextBtn" onclick="nextCard()">Weiter ➡</button>

<div style="margin-top:40px;">
  <button class="back" onclick="previousCard()">⬅ Zurück</button>
</div>

<div id="feedback" class="feedback"></div>
<div id="summary" class="summary hidden"></div>

<script>

// ---------------- CHARACTER POOL ----------------

const characters = [
"Gumball","Darwin","Anais","Nicole",
"Richard","Tobias","Penny","Banana Joe",
"Carrie","Alan","Masami","Principal Brown"
];

// ---------------- WORD POOLS (Harder) ----------------

const nounPool = [
"Konsequenz","Katastrophe","Strategie","Illusion","Provokation",
"Diskussion","Entscheidung","Reaktion","Verantwortung","Geheimnis",
"Transformation","Komplikation","Theorie","Vision","Kollision",
"Mutation","Manipulation","Verwirrung","Mission","Demonstration"
];

const verbPool = [
"analysiert","übertreibt","manipuliert","provoziert","reagiert",
"unterbricht","unterschätzt","verzweifelt","argumentiert","verschwindet",
"beschleunigt","eskaliert","interpretiert","explodiert","überrascht",
"behauptet","beobachtet","verursacht","entwickelt","dramatisiert"
];

const adjectivePool = [
"chaotisch","dramatisch","absurd","genial","riskant",
"kompliziert","mysteriös","übertrieben","verantwortungslos","brillant",
"ironisch","peinlich","strategisch","verwirrend","unglaublich",
"lächerlich","mutig","unlogisch","episch","katastrophal"
];

const pronounPool = [
"niemand","jemand","alle","keiner","dieser",
"welcher","man","etwas","nichts","solcher"
];

const adverbPool = [
"plötzlich","absichtlich","wahrscheinlich","heimlich","ständig",
"unerwartet","extrem","merkwürdigerweise","offensichtlich","dramatisch"
];

// ---------------- BUILD 1000 ENTRIES ----------------

let wordDB=[];

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function buildDatabase(){
  for(let i=0;i<200;i++){
    wordDB.push(createEntry(nounPool,"Nomen"));
    wordDB.push(createEntry(verbPool,"Verb"));
    wordDB.push(createEntry(adjectivePool,"Adjektiv"));
    wordDB.push(createEntry(pronounPool,"Pronomen"));
    wordDB.push(createEntry(adverbPool,"Adverb"));
  }
}

function createEntry(pool,type){

  let word=random(pool);
  let c1=random(characters);
  let c2=random(characters);
  let c3=random(characters);

  let sentence="";

  if(type==="Nomen"){
    sentence = 
    "In einer völlig unerwarteten Wendung führte Gumballs neuester Plan zu einer gigantischen <b>"+word+
    "</b>. "+c1+" war überzeugt, dass das alles Teil einer geheimen Superhelden-Ausbildung sei, während "+c2+
    " dramatisch aus dem Fenster sprang.";
  }

  if(type==="Verb"){
    sentence =
    c1+" "+ "<b>"+word+"</b>" +
    " mitten im Unterricht, als Anais versuchte, eine wissenschaftliche Präsentation zu halten. "+
    c2+" kommentierte das Ganze wie ein Sportmoderator.";
  }

  if(type==="Adjektiv"){
    sentence =
    "Der geheime Plan von "+c1+" war so <b>"+word+
    "</b>, dass selbst Darwin kurz überlegte, erwachsen zu werden. "+
    c2+" klatschte trotzdem begeistert.";
  }

  if(type==="Pronomen"){
    sentence =
    "Plötzlich wusste <b>"+word+
    "</b>, warum Richard wieder einmal die Küche in Brand gesetzt hatte. "+
    c1+" beschloss, es einfach als 'kreatives Experiment' zu bezeichnen.";
  }

  if(type==="Adverb"){
    sentence =
    c1+" reagierte <b>"+word+
    "</b>, nachdem Tobias behauptet hatte, er sei offiziell zum König von Elmore gewählt worden. "+
    c2+" begann sofort mit einer dramatischen Krönungszeremonie.";
  }

  return {word,type,sentence};
}

buildDatabase();

// ---------------- SHUFFLE ----------------

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

// ---------------- SPACED REPETITION ----------------

let wrongStats = JSON.parse(localStorage.getItem("wortStatsFinal")) || {};
let gameWords=[];
let current=0;
let score=0;
let answered=[];

function weightedSelection(){

  let weighted=[];

  wordDB.forEach(w=>{
    let weight = wrongStats[w.word] ? 10 : 1;
    for(let i=0;i<weight;i++){
      weighted.push(w);
    }
  });

  shuffle(weighted);

  let selected=[];
  let used=new Set();

  for(let w of weighted){
    if(!used.has(w.word)){
      selected.push(w);
      used.add(w.word);
    }
    if(selected.length===20) break;
  }

  return selected;
}

function startGame(){
  gameWords=weightedSelection();
  current=0;
  score=0;
  answered=[];
  showCard();
}

function showCard(){
  document.getElementById("feedback").innerHTML="";
  document.getElementById("card").innerHTML=gameWords[current].word;
  document.getElementById("nextBtn").classList.add("hidden");
}

function guess(type){

  if(answered[current]) return;

  let correct=gameWords[current].type;
  let word=gameWords[current].word;

  if(type===correct){
    score++;
    document.getElementById("feedback").innerHTML=
    "🎉 Richtig! <b>"+word+"</b> ist ein "+correct+".";
  }else{
    wrongStats[word]=true;
    document.getElementById("feedback").innerHTML=
    "❌ Falsch! <b>"+word+"</b> ist ein "+correct+".";
  }

  localStorage.setItem("wortStatsFinal",JSON.stringify(wrongStats));

  answered[current]=true;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function showHelp(){
  document.getElementById("feedback").innerHTML="💡 "+gameWords[current].sentence;
}

function nextCard(){
  if(current<19){
    current++;
    showCard();
  }else{
    endGame();
  }
}

function previousCard(){
  if(current>0){
    current--;
    showCard();
  }
}

function endGame(){

  document.getElementById("card").classList.add("hidden");
  document.getElementById("choices").classList.add("hidden");

  let html="<h2>🏁 Ergebnis</h2>";
  html+="Du hast "+score+" von 20 richtig.<br><br>";

  if(score===20){
    html+="🌟 Perfekt! Nicole wäre stolz.";
  }else if(score>=15){
    html+="🔥 Stark! Anais nickt respektvoll.";
  }else{
    html+="💪 Weiter üben! Gumball würde einfach nochmal starten.";
  }

  document.getElementById("summary").innerHTML=html;
  document.getElementById("summary").classList.remove("hidden");
}

startGame();

</script>
</body>
</html>
