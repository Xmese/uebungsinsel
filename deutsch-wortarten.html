<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Wortarten Trainer</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff8e6;
  text-align:center;
  padding:20px;
}

h1{margin-bottom:5px;}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  margin:20px auto;
  max-width:400px;
  font-size:28px;
}

button{
  margin:8px;
  padding:10px 15px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
}

button.help{
  background:#ff9800;
}

button.next{
  background:#2196F3;
}

.result{
  font-weight:bold;
  margin-top:15px;
}

.hidden{display:none;}
</style>
</head>
<body>

<h1>📚 Wortarten Trainer</h1>
<p>20 Karten pro Spiel</p>

<div class="card" id="card">Wort</div>

<div id="buttons">
  <button onclick="guess('Nomen')">Nomen</button>
  <button onclick="guess('Verb')">Verb</button>
  <button onclick="guess('Adjektiv')">Adjektiv</button>
  <button onclick="guess('Pronomen')">Pronomen</button>
</div>

<br>
<button class="help" onclick="showHelp()">💡 Hilfe (Satz)</button>
<button class="next hidden" onclick="nextCard()">Nächste Karte</button>

<div class="result" id="feedback"></div>

<div id="summary" class="hidden"></div>

<script>

// -------- WORD DATABASE (500+) --------

const nouns = ["Hund","Katze","Haus","Baum","Auto","Buch","Stuhl","Tisch","Blume","Kind",
"Schule","Lehrer","Freund","Ball","Apfel","Wasser","Berg","Fluss","Tür","Fenster",
"Vogel","Sonne","Mond","Stern","Brot","Milch","Zug","Strasse","Stadt","Dorf",
"Computer","Telefon","Uhr","Bild","Spiel","Heft","Bleistift","Jacke","Schuh","Hose",
"Sommer","Winter","Frühling","Herbst","Tag","Nacht","Minute","Stunde","Sekunde","Woche"];

const verbs = ["laufen","springen","lesen","schreiben","essen","trinken","spielen",
"fahren","sehen","hören","denken","lernen","malen","bauen","kaufen","singen",
"tanzen","sprechen","fragen","antworten","schlafen","wachen","tragen","werfen",
"finden","bringen","holen","suchen","zeigen","öffnen","schliessen","helfen"];

const adjectives = ["gross","klein","schnell","langsam","schön","hässlich","laut",
"leise","warm","kalt","hell","dunkel","fröhlich","traurig","stark","schwach",
"jung","alt","kurz","lang","leicht","schwer","teuer","billig","hungrig","müde"];

const pronouns = ["ich","du","er","sie","es","wir","ihr","mich","dich","uns",
"mein","dein","sein","ihr","unser","dieser","diese","dieses","man","jemand"];

// expand automatically to reach ~500 words
function expand(base){
  let arr=[...base];
  while(arr.length<125){
    arr.push(base[Math.floor(Math.random()*base.length)]);
  }
  return arr;
}

const wordDB = [
  ...expand(nouns).map(w=>({word:w,type:"Nomen"})),
  ...expand(verbs).map(w=>({word:w,type:"Verb"})),
  ...expand(adjectives).map(w=>({word:w,type:"Adjektiv"})),
  ...expand(pronouns).map(w=>({word:w,type:"Pronomen"}))
];

// -------- SPACED REPETITION --------

let wrongStats = JSON.parse(localStorage.getItem("wortartenStats")) || {};
let gameWords=[];
let current=0;
let score=0;
let wrongAnswers=[];

function weightedRandom(){
  let pool=[];
  wordDB.forEach(w=>{
    let weight=1;
    if(wrongStats[w.word]) weight=10;
    for(let i=0;i<weight;i++){
      pool.push(w);
    }
  });
  return pool[Math.floor(Math.random()*pool.length)];
}

function startGame(){
  gameWords=[];
  for(let i=0;i<20;i++){
    gameWords.push(weightedRandom());
  }
  current=0;
  score=0;
  wrongAnswers=[];
  showCard();
}

function showCard(){
  document.getElementById("feedback").innerHTML="";
  document.querySelector(".next").classList.add("hidden");
  document.getElementById("card").innerHTML=gameWords[current].word;
}

function guess(type){

  let correct=gameWords[current].type;
  let word=gameWords[current].word;

  if(type===correct){
    score++;
    document.getElementById("feedback").innerHTML=
      "🎉 Richtig! '"+word+"' ist ein "+correct+".";
  } else {
    wrongAnswers.push(gameWords[current]);
    wrongStats[word]=true;
    document.getElementById("feedback").innerHTML=
      "❌ Falsch! '"+word+"' ist ein "+correct+
      ".<br>Ein "+correct+" ist "+
      explanation(correct);
  }

  localStorage.setItem("wortartenStats",JSON.stringify(wrongStats));
  document.querySelector(".next").classList.remove("hidden");
}

function explanation(type){
  if(type==="Nomen") return "ein Wort für Dinge, Menschen oder Tiere (man kann 'der/die/das' davor setzen).";
  if(type==="Verb") return "ein Tunwort (was man macht).";
  if(type==="Adjektiv") return "ein Wiewort (beschreibt etwas).";
  if(type==="Pronomen") return "ein Fürwort (steht für ein Nomen).";
}

function showHelp(){
  let word=gameWords[current].word;
  document.getElementById("feedback").innerHTML=
    "💡 Beispielsatz:<br>Ich benutze das Wort '"+word+"' in einem Satz.";
}

function nextCard(){
  current++;
  if(current>=20){
    endGame();
  } else {
    showCard();
  }
}

function endGame(){

  document.getElementById("card").classList.add("hidden");
  document.getElementById("buttons").classList.add("hidden");
  document.querySelector(".help").classList.add("hidden");
  document.querySelector(".next").classList.add("hidden");

  let html="<h2>🏁 Ergebnis</h2>";
  html+="Du hast "+score+" von 20 richtig.<br><br>";

  if(wrongAnswers.length>0){
    html+="<b>Diese Wörter waren schwierig:</b><br>";
    wrongAnswers.forEach(w=>{
      html+=w.word+" ("+w.type+")<br>";
    });
  } else {
    html+="🎉 Perfekt! Keine Fehler!";
  }

  document.getElementById("summary").innerHTML=html;
  document.getElementById("summary").classList.remove("hidden");
}

startGame();

</script>
</body>
</html>
