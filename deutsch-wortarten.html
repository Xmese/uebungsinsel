<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 Wortarten – Elmore Chaos Edition</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align:center;
  padding:20px;
  margin:0;
}

h1{
  color:white;
  text-shadow:2px 2px 6px rgba(0,0,0,0.3);
}

.card{
  background:white;
  padding:100px 40px;
  border-radius:30px;
  box-shadow:0 15px 40px rgba(0,0,0,0.25);
  margin:40px auto;
  max-width:850px;
  font-size:64px;
  font-weight:bold;
}

button{
  margin:8px;
  padding:14px 22px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  color:white;
}

.nomen{background:#4CAF50;}
.verb{background:#2196F3;}
.adj{background:#ff9800;}
.pron{background:#9c27b0;}
.adv{background:#e91e63;}
.help{background:#455a64;}
.next{background:#3f51b5;}
.back{background:#673ab7;}

.feedback{
  margin-top:20px;
  font-size:18px;
  max-width:850px;
  margin-left:auto;
  margin-right:auto;
  background:white;
  padding:20px;
  border-radius:15px;
}

.summary{
  margin-top:30px;
  font-size:20px;
  background:white;
  padding:25px;
  border-radius:20px;
  max-width:850px;
  margin-left:auto;
  margin-right:auto;
}

.hidden{display:none;}
</style>
</head>
<body>

<h1>📚 Wortarten – Elmore Chaos Edition</h1>
<p style="color:white;">20 Karten · Schwer · 1000+ Einträge</p>

<div id="card" class="card"></div>

<div id="choices">
  <button class="nomen" onclick="guess('Nomen')">Nomen</button>
  <button class="verb" onclick="guess('Verb')">Verb</button>
  <button class="adj" onclick="guess('Adjektiv')">Adjektiv</button>
  <button class="pron" onclick="guess('Pronomen')">Pronomen</button>
  <button class="adv" onclick="guess('Adverb')">Adverb</button>
</div>

<br>
<button class="help" onclick="showHelp()">💡 Hilfe – Mini Episode</button>
<button class="next hidden" id="nextBtn" onclick="nextCard()">Weiter ➡</button>

<div style="margin-top:40px;">
  <button class="back" onclick="previousCard()">⬅ Zurück</button>
</div>

<div id="feedback" class="feedback"></div>
<div id="summary" class="summary hidden"></div>

<script>

// ---------------- REAL CHARACTER LIST ----------------

const characters = [
"Gumball",
"Darwin",
"Anais",
"Nicole",
"Richard",
"Tobias",
"Penny",
"Banana Joe",
"Carrie",
"Alan",
"Masami",
"Principal Brown",
"Miss Simian",
"Bobert"
];

// ---------------- HARD WORD POOLS ----------------

const nounPool = [
"Konsequenz","Katastrophe","Illusion","Provokation","Diskussion",
"Strategie","Mutation","Transformation","Manipulation","Komplikation"
];

const verbPool = [
"eskaliert","dramatisiert","manipuliert","provoziert","übertreibt",
"argumentiert","explodiert","beschuldigt","verursacht","inszeniert"
];

const adjectivePool = [
"absurd","dramatisch","strategisch","chaotisch","peinlich",
"übertrieben","katastrophal","genial","verwirrend","episch"
];

const pronounPool = [
"niemand","jemand","alle","keiner","dieser","welcher","man"
];

const adverbPool = [
"plötzlich","absichtlich","extrem","heimlich","unerwartet",
"dramatisch","offensichtlich","wahrscheinlich"
];

// ---------------- DATABASE ----------------

let wordDB=[];

function random(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function buildDatabase(){
  for(let i=0;i<200;i++){
    wordDB.push(createEntry(nounPool,"Nomen"));
    wordDB.push(createEntry(verbPool,"Verb"));
    wordDB.push(createEntry(adjectivePool,"Adjektiv"));
    wordDB.push(createEntry(pronounPool,"Pronomen"));
    wordDB.push(createEntry(adverbPool,"Adverb"));
  }
}

function createEntry(pool,type){

  let word=random(pool);
  let c1=random(characters);
  let c2=random(characters);
  let c3=random(characters);

  let sentence="";

  if(type==="Nomen"){
    sentence =
    "Als Gumball beschloss, Bürgermeister von Elmore zu werden, endete seine Wahlkampfrede in einer gigantischen <b>"+word+
    "</b>. Darwin verteilte Autogramme, während Miss Simian die Polizei rief, weil Richard Konfetti aus dem Toaster schoss.";
  }

  if(type==="Verb"){
    sentence =
    "Mitten in der Turnhalle "+c1+" plötzlich <b>"+word+
    "</b>, nachdem Tobias behauptet hatte, er könne schneller denken als Bobert. "+
    "Anais führte sofort eine wissenschaftliche Live-Analyse durch, während Banana Joe dramatische Musik summte.";
  }

  if(type==="Adjektiv"){
    sentence =
    "Der neue Plan von "+c1+" war so <b>"+word+
    "</b>, dass selbst Nicole kurz ihre Lebensentscheidungen hinterfragte. "+
    c2+" applaudierte begeistert und rief: 'Das ist Fernsehen-Gold!'";
  }

  if(type==="Pronomen"){
    sentence =
    "Plötzlich wusste <b>"+word+
    "</b>, warum Principal Brown im Kostüm eines Einhorns durch die Schule rannte. "+
    "Gumball erklärte feierlich, das sei pädagogisch wertvoll.";
  }

  if(type==="Adverb"){
    sentence =
    c1+" reagierte <b>"+word+
    "</b>, als Carrie versehentlich das WLAN mit einem Geisterfluch belegte. "+
    "Darwin versuchte, das Problem mit einem Sandwich zu lösen.";
  }

  return {word,type,sentence};
}

buildDatabase();

// ---------------- SHUFFLE ----------------

function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

// ---------------- SPACED REPETITION ----------------

let wrongStats = JSON.parse(localStorage.getItem("wortChaos")) || {};
let gameWords=[];
let current=0;
let score=0;
let answered=[];

function weightedSelection(){

  let weighted=[];

  wordDB.forEach(w=>{
    let weight = wrongStats[w.word] ? 10 : 1;
    for(let i=0;i<weight;i++){
      weighted.push(w);
    }
  });

  shuffle(weighted);

  let selected=[];
  let used=new Set();

  for(let w of weighted){
    if(!used.has(w.word)){
      selected.push(w);
      used.add(w.word);
    }
    if(selected.length===20) break;
  }

  return selected;
}

function startGame(){
  gameWords=weightedSelection();
  current=0;
  score=0;
  answered=[];
  showCard();
}

function showCard(){
  document.getElementById("feedback").innerHTML="";
  document.getElementById("card").innerHTML=gameWords[current].word;
  document.getElementById("nextBtn").classList.add("hidden");
}

function guess(type){

  if(answered[current]) return;

  let correct=gameWords[current].type;
  let word=gameWords[current].word;

  if(type===correct){
    score++;
    document.getElementById("feedback").innerHTML=
    "🎉 Richtig! <b>"+word+"</b> ist ein "+correct+".";
  }else{
    wrongStats[word]=true;
    document.getElementById("feedback").innerHTML=
    "❌ Falsch! <b>"+word+"</b> ist ein "+correct+".";
  }

  localStorage.setItem("wortChaos",JSON.stringify(wrongStats));

  answered[current]=true;
  document.getElementById("nextBtn").classList.remove("hidden");
}

function showHelp(){
  document.getElementById("feedback").innerHTML="💡 "+gameWords[current].sentence;
}

function nextCard(){
  if(current<19){
    current++;
    showCard();
  }else{
    endGame();
  }
}

function previousCard(){
  if(current>0){
    current--;
    showCard();
  }
}

function endGame(){

  document.getElementById("card").classList.add("hidden");
  document.getElementById("choices").classList.add("hidden");

  let html="<h2>🏁 Ergebnis</h2>";
  html+="Du hast "+score+" von 20 richtig.<br><br>";

  if(score===20){
    html+="🌟 Nicole nickt anerkennend.";
  }else if(score>=15){
    html+="🔥 Anais ist beeindruckt.";
  }else{
    html+="💥 Gumball würde einfach behaupten, es war Absicht.";
  }

  document.getElementById("summary").innerHTML=html;
  document.getElementById("summary").classList.remove("hidden");
}

startGame();

</script>
</body>
</html>
