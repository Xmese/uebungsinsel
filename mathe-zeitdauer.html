<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mathe – Zeitdauer</title>
  <style>
    :root{font-family:-apple-system,system-ui,Arial,sans-serif}
    body{margin:0;background:radial-gradient(1100px 700px at 15% 0%,#fff4e8 0%,#f6f7fb 45%),radial-gradient(900px 600px at 90% 5%,#e9f5ff 0%,#f6f7fb 55%),#f6f7fb;color:#111}
    header{position:sticky;top:0;background:rgba(246,247,251,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e6e6ef;padding:14px;z-index:10}
    h1{margin:0;font-size:18px;font-weight:900}
    .sub{margin-top:6px;font-size:13px;opacity:.75;line-height:1.35}
    main{max-width:980px;margin:0 auto;padding:14px 12px 110px}
    .card{background:#fff;border:1px solid #e6e6ef;border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 1px 0 rgba(0,0,0,.03)}
    .q{padding:12px;border-radius:16px;background:radial-gradient(600px 120px at 20% 0%,#fff8ea 0%,rgba(255,248,234,0) 60%),radial-gradient(600px 120px at 90% 10%,#eef7ff 0%,rgba(238,247,255,0) 60%),#fafaff;border:1px solid #ededff;margin:10px 0}
    input,select{width:100%;padding:10px 12px;border-radius:14px;border:1px solid #d9d9e7;font-size:16px;background:#fff}
    label{display:block;margin:8px 0}
    .hint{margin-top:8px;font-size:13px;opacity:.75;line-height:1.35}
    .result{margin-top:10px;padding:10px 12px;border-radius:14px;border:1px solid #e6e6ef;background:#fff}
    .btnbar{position:fixed;left:0;right:0;bottom:0;background:rgba(246,247,251,.92);backdrop-filter:blur(10px);border-top:1px solid #e6e6ef;padding:10px 12px}
    button{width:100%;padding:12px 14px;border-radius:16px;border:0;background:#111;color:#fff;font-size:16px;font-weight:900}
    .smallbtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .smallbtns3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
    .ghost{background:#fff;color:#111;border:1px solid #d9d9e7}
    .back a{display:inline-block;text-decoration:none;color:#111;border:1px solid #d9d9e7;background:#fff;padding:9px 12px;border-radius:999px;font-weight:850}
  </style>
</head>
<body>
<header>
  <h1>⏱️ Mathe: Zeitdauer</h1>
  <div class="sub">Umrechnen · Ergänzen · Sachaufgaben · Stimmt das?</div>
</header>

<main>
  <div class="card back">
    <a href="./index.html">⬅️ Zurück zur Startseite</a>
    <div class="hint">Merke: <b>1 min = 60 s</b>, <b>1 h = 60 min</b></div>
  </div>

  <div class="card">
    <div id="quizMount"></div>
  </div>
</main>

<div class="btnbar">
  <button id="checkBtn">✅ Prüfen</button>
  <div class="smallbtns3">
    <button class="ghost" id="newBtn" type="button">🔄 Neue Runde</button>
    <button class="ghost" id="resetBtn" type="button">↩️ Reset</button>
    <button class="ghost" id="showBtn" type="button">👀 Lösungen</button>
  </div>
</div>

<script type="module">
  import { randInt, choice, renderQuiz, shuffle } from "./quizlib.js";

  function build() {
    const qs = [];

    // A) Umrechnen gemischt
    // 1) m s -> seconds
    {
      const m = randInt(2, 9);
      const s = choice([5,10,15,20,25,30,35,40,45,50,55]);
      qs.push({
        id:"a1",
        type:"num",
        promptHtml:`<b>A1)</b> ${m} min ${s} s = ____ s`,
        answer:String(m*60 + s),
      });
    }
    // 2) seconds -> min s
    {
      const m = randInt(2, 8);
      const s = choice([5,10,15,20,25,30,35,40,45,50,55]);
      const total = m*60 + s;
      qs.push({
        id:"a2",
        type:"pair",
        promptHtml:`<b>A2)</b> ${total} s = ____ min ____ s`,
        answer:`${m}|${s}`,
      });
    }
    // 3) h min -> minutes
    {
      const h = 1;
      const m = randInt(5, 55);
      qs.push({
        id:"a3",
        type:"num",
        promptHtml:`<b>A3)</b> ${h} h ${m} min = ____ min`,
        answer:String(h*60 + m),
      });
    }
    // 4) minutes -> h min
    {
      const totalMin = randInt(70, 135);
      const h = Math.floor(totalMin/60);
      const m = totalMin%60;
      qs.push({
        id:"a4",
        type:"pair",
        promptHtml:`<b>A4)</b> ${totalMin} min = ____ h ____ min`,
        answer:`${h}|${m}`,
      });
    }

    // B) Ergänzen bis Zielzeit
    {
      const m1 = randInt(2, 9);
      const s1 = choice([0,10,20,30,40,50]);
      const m2 = m1 + 1;
      const total1 = m1*60 + s1;
      const total2 = m2*60;
      qs.push({
        id:"b1",
        type:"num",
        promptHtml:`<b>B1)</b> ${m1} min ${s1} s + ____ s = ${m2} min`,
        answer:String(total2 - total1),
      });
    }
    {
      const m = randInt(1, 8);
      const targetM = m + randInt(1,2);
      const targetS = choice([10,20,30,40,50]);
      const need = (targetM*60 + targetS) - (m*60);
      qs.push({
        id:"b2",
        type:"num",
        promptHtml:`<b>B2)</b> ${m} min + ____ s = ${targetM} min ${targetS} s`,
        answer:String(need),
      });
    }

    // C) Sachaufgabe
    {
      const a = randInt(8, 18);
      const b = randInt(6, 15);
      qs.push({
        id:"c1",
        type:"num",
        promptHtml:`<b>C1)</b> Lina liest ${a} min und danach nochmals ${b} min. Insgesamt: ____ min`,
        answer:String(a+b),
      });
    }
    {
      const filmH = 1;
      const filmM = choice([10,15,20,25,30,35,40,45,50]);
      const watched = randInt(35, 75);
      const total = filmH*60 + filmM;
      const rest = total - watched;
      const rh = Math.floor(rest/60);
      const rm = rest%60;
      qs.push({
        id:"c2",
        type:"pair",
        promptHtml:`<b>C2)</b> Ein Film dauert ${filmH} h ${filmM} min. Nach ${watched} min Pause: Wie lange läuft er noch? ____ h ____ min`,
        answer:`${rh}|${rm}`,
        explain:"Tipp: zuerst alles in Minuten rechnen."
      });
    }

    // D) Stimmt das?
    const tfStatements = shuffle([
      {t:`In 2 Minuten gehen genau 120 Sekunden vorbei.`, a:"richtig"},
      {t:`Eine halbe Stunde ist gleich lang wie 25 Minuten.`, a:"falsch"},
      {t:`90 Sekunden sind mehr als 1 Minute.`, a:"richtig"},
      {t:`In 1 Stunde laufen die Minutenzeiger 2 Mal im Kreis.`, a:"falsch"},
      {t:`In 60 Minuten läuft der Minutenzeiger einmal im Kreis herum.`, a:"richtig"},
    ]).slice(0,3);

    tfStatements.forEach((x,i)=>{
      qs.push({
        id:"d"+(i+1),
        type:"select",
        promptHtml:`<b>D${i+1})</b> ${x.t}`,
        options:[{v:"richtig",label:"richtig"},{v:"falsch",label:"falsch"}],
        answer:x.a
      })
    });

    return qs;
  }

  let api = null;
  function newRound(){
    const qs = build();
    api = renderQuiz({ mount: document.getElementById("quizMount"), questions: qs });
  }

  newRound();

  document.getElementById("checkBtn").addEventListener("click", ()=>api.check());
  document.getElementById("resetBtn").addEventListener("click", ()=>api.reset());
  document.getElementById("showBtn").addEventListener("click", ()=>api.showSolutions());
  document.getElementById("newBtn").addEventListener("click", newRound);
</script>
</body>
</html>
